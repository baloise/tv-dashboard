<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dashboard Controller</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1a1a2e; }

  /* --- Coffee overlay (visible when controller tab is in foreground) --- */
  #coffee-overlay {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg, #3e2723, #4e342e, #5d4037);
    flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer;
  }
  #coffee-overlay.active { display: flex; }

  .coffee-pot {
    font-size: min(40vw, 40vh);
    animation: wobble 2s ease-in-out infinite;
    filter: drop-shadow(0 0 40px rgba(255,200,50,0.3));
  }
  .coffee-text {
    color: #d7ccc8; font-size: min(6vw, 6vh); margin-top: 30px;
    font-weight: 300; letter-spacing: 4px; text-transform: uppercase;
  }
  .coffee-subtext {
    color: #8d6e63; font-size: min(2.5vw, 2.5vh); margin-top: 15px;
  }

  .steam-container {
    position: relative; width: min(40vw, 40vh); height: min(15vw, 15vh);
  }
  .steam {
    position: absolute; bottom: 0;
    width: 8px; background: rgba(255,255,255,0.15);
    border-radius: 50%; filter: blur(6px);
    animation: steam-rise 2s ease-out infinite;
  }
  .steam:nth-child(1) { left: 30%; animation-delay: 0s; height: 40px; }
  .steam:nth-child(2) { left: 50%; animation-delay: 0.5s; height: 50px; }
  .steam:nth-child(3) { left: 70%; animation-delay: 1s; height: 35px; }

  @keyframes steam-rise {
    0%   { opacity: 0; transform: translateY(0) scaleX(1); }
    50%  { opacity: 0.6; transform: translateY(-60px) scaleX(2); }
    100% { opacity: 0; transform: translateY(-120px) scaleX(3); }
  }
  @keyframes wobble {
    0%, 100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg); }
  }

  /* --- Controller status screen --- */
  #controller-status {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #eee; font-size: 18px; text-align: center; padding: 40px;
  }
  #controller-status h1 { font-size: 28px; margin-bottom: 20px; color: #6c63ff; }
  #controller-status .info { color: #888; font-size: 14px; margin-top: 10px; }
  #controller-status .status { color: #4caf50; margin-top: 20px; font-size: 16px; }
  #controller-status .error { color: #f44336; }

  #log {
    margin-top: 30px; text-align: left; font-family: monospace; font-size: 12px;
    color: #666; max-height: 200px; overflow-y: auto; width: 80%; max-width: 600px;
  }
  #log div { padding: 2px 0; border-bottom: 1px solid #222; }
</style>
</head>
<body>

<div id="controller-status">
  <h1>Dashboard Controller</h1>
  <div id="status-msg">Connecting to CDP on port 9222...</div>
  <div class="info">This tab controls the display tab via Chrome DevTools Protocol.</div>
  <div class="info">Press <b>C</b> for coffee break. The display tab shows your dashboards.</div>
  <div id="log"></div>
</div>

<div id="coffee-overlay" onclick="endCoffee()">
  <div class="steam-container">
    <div class="steam"></div>
    <div class="steam"></div>
    <div class="steam"></div>
  </div>
  <div class="coffee-pot">&#9749;</div>
  <div class="coffee-text">Coffee Break</div>
  <div class="coffee-subtext">click anywhere or press C to dismiss</div>
</div>

<script>
// =============================================================
// CONFIG
// =============================================================
const CDP_URL = "http://localhost:9222";
const CONFIG_URL = "https://gist.githubusercontent.com/Lendrit20/1507ca49040c910d087297a00e922ff2/raw/config.json";
const CONFIG_POLL_SECONDS = 60;
// =============================================================

let currentConfig = null;
let currentUrl = null;
let coffeeActive = false;
let configHash = "";
let rotationIndex = 0;
let rotationTimer = null;
let displayTabId = null;
let dashboardTabId = null;
let displayWs = null;
let cdpMessageId = 0;

function log(msg) {
  console.log(msg);
  const el = document.getElementById("log");
  const line = document.createElement("div");
  line.textContent = new Date().toLocaleTimeString() + " — " + msg;
  el.prepend(line);
  // Keep only last 20 lines
  while (el.children.length > 20) el.removeChild(el.lastChild);
}

function setStatus(msg, isError) {
  const el = document.getElementById("status-msg");
  el.textContent = msg;
  el.className = isError ? "status error" : "status";
}

// --- CDP ---
async function initCDP() {
  try {
    // List existing tabs
    const resp = await fetch(CDP_URL + "/json");
    const tabs = await resp.json();
    log("Found " + tabs.length + " tab(s)");

    // Find our controller tab (this page)
    const dashTab = tabs.find(t => t.url.includes("dashboard"));
    if (dashTab) dashboardTabId = dashTab.id;

    // Find or create a display tab (any tab that isn't the dashboard)
    let displayTab = tabs.find(t => !t.url.includes("dashboard") && t.type === "page");

    if (!displayTab) {
      // Try PUT method (Edge) then GET (Chrome) for creating new tab
      let newResp = await fetch(CDP_URL + "/json/new?about:blank", { method: "PUT" });
      if (!newResp.ok) {
        newResp = await fetch(CDP_URL + "/json/new?about:blank");
      }
      displayTab = await newResp.json();
      log("Created display tab: " + displayTab.id);
    } else {
      log("Reusing existing tab: " + displayTab.id);
    }

    displayTabId = displayTab.id;

    // Connect WebSocket to display tab
    await connectDisplayTab(displayTab.webSocketDebuggerUrl);

    // Activate display tab (bring to foreground)
    await fetch(CDP_URL + "/json/activate/" + displayTabId).catch(() => {});

    setStatus("Connected. Display tab active.", false);

    // Start config polling
    await fetchConfig();
    setInterval(() => { fetchConfig(); applyConfig(); }, CONFIG_POLL_SECONDS * 1000);
    setInterval(applyConfig, 60 * 1000);

  } catch (e) {
    log("CDP init failed: " + e.message);
    setStatus("CDP connection failed. Is the browser running with --remote-debugging-port=9222?", true);

    // Retry after 5 seconds
    setTimeout(initCDP, 5000);
  }
}

function connectDisplayTab(wsUrl) {
  return new Promise((resolve, reject) => {
    displayWs = new WebSocket(wsUrl);
    displayWs.onopen = () => {
      log("WebSocket connected to display tab");
      resolve();
    };
    displayWs.onerror = (e) => {
      log("WebSocket error");
      reject(e);
    };
    displayWs.onclose = () => {
      log("WebSocket closed — display tab may have been closed");
      displayWs = null;
    };
  });
}

function cdpSend(method, params) {
  if (!displayWs || displayWs.readyState !== WebSocket.OPEN) {
    log("WebSocket not connected, skipping: " + method);
    return;
  }
  displayWs.send(JSON.stringify({ id: ++cdpMessageId, method, params }));
}

function navigateTo(url) {
  if (!url || url === currentUrl) return;
  currentUrl = url;
  log("Navigating to: " + new URL(url).hostname);

  cdpSend("Page.navigate", { url });

  // Bring display tab to foreground (in case we're in coffee break view)
  if (!coffeeActive) {
    fetch(CDP_URL + "/json/activate/" + displayTabId).catch(() => {});
  }

  const urls = currentConfig?.defaultUrls || [];
  const rotationInfo = urls.length > 1 ? " | Page " + (rotationIndex + 1) + "/" + urls.length : "";
  setStatus("Showing: " + new URL(url).hostname + rotationInfo, false);
}

// --- Config fetching ---
async function fetchConfig() {
  try {
    const resp = await fetch(CONFIG_URL + "?_=" + Date.now(), { cache: "no-store" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();

    const newHash = JSON.stringify(data);
    if (newHash !== configHash) {
      configHash = newHash;
      currentConfig = data;
      log("Config updated");
      applyConfig();
      startRotation(data);
    }
  } catch (e) {
    log("Config fetch failed: " + e.message);
    if (!currentConfig) {
      currentConfig = getDefaultConfig();
      applyConfig();
      startRotation(currentConfig);
    }
  }
}

function getDefaultConfig() {
  return {
    defaultUrls: [
      "https://confluence.baloisenet.com/x/aYuE1Q#zoomOnLoad=true&auto-reload=97",
      "https://confluence.baloisenet.com/spaces/AC/pages/3665113558/Depot+Extractor+Metrics+Dashboard+Prod#zoomOnLoad=true&auto-reload=97"
    ],
    rotationIntervalSeconds: 300,
    schedule: [{
      url: "https://sv-gastronomie.ch/menu/Baloise,%20Basel/Mittagsmen%C3%BC%20Nord",
      startTime: "11:15",
      endTime: "11:45"
    }],
    coffeeBreakMinutes: 15
  };
}

// --- Rotation ---
function getActiveScheduledUrl(config) {
  if (!config.schedule) return null;
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  for (const entry of config.schedule) {
    const [sh, sm] = entry.startTime.split(":").map(Number);
    const [eh, em] = entry.endTime.split(":").map(Number);
    if (nowMins >= sh * 60 + sm && nowMins < eh * 60 + em) return entry.url;
  }
  return null;
}

function getDefaultUrl(config) {
  const urls = config.defaultUrls || (config.defaultUrl ? [config.defaultUrl] : []);
  if (urls.length === 0) return null;
  return urls[rotationIndex % urls.length];
}

function startRotation(config) {
  if (rotationTimer) clearInterval(rotationTimer);
  const urls = config.defaultUrls || (config.defaultUrl ? [config.defaultUrl] : []);
  const interval = (config.rotationIntervalSeconds || 300) * 1000;

  if (urls.length > 1) {
    rotationTimer = setInterval(() => {
      if (!config.forceUrl && !getActiveScheduledUrl(config)) {
        rotationIndex = (rotationIndex + 1) % urls.length;
        currentUrl = null; // Force navigation
        navigateTo(urls[rotationIndex]);
      }
    }, interval);
  }
}

function applyConfig() {
  if (!currentConfig) return;
  const overrideUrl = currentConfig.forceUrl || getActiveScheduledUrl(currentConfig);
  navigateTo(overrideUrl || getDefaultUrl(currentConfig));
}

// --- Coffee break ---
function startCoffee() {
  if (coffeeActive) return;
  coffeeActive = true;
  document.getElementById("coffee-overlay").classList.add("active");
  log("Coffee break started");

  // Bring controller tab to foreground to show coffee overlay
  if (dashboardTabId) {
    fetch(CDP_URL + "/json/activate/" + dashboardTabId).catch(() => {});
  }

  // Auto-dismiss after configured duration
  if (currentConfig?.coffeeBreakMinutes) {
    setTimeout(() => { if (coffeeActive) endCoffee(); },
      currentConfig.coffeeBreakMinutes * 60 * 1000);
  }
}

function endCoffee() {
  if (!coffeeActive) return;
  coffeeActive = false;
  document.getElementById("coffee-overlay").classList.remove("active");
  log("Coffee break ended");

  // Bring display tab back to foreground
  if (displayTabId) {
    fetch(CDP_URL + "/json/activate/" + displayTabId).catch(() => {});
  }
}

function toggleCoffee() {
  coffeeActive ? endCoffee() : startCoffee();
}

// Keyboard: C for coffee
document.addEventListener("keydown", (e) => {
  if (e.key === "c" || e.key === "C") toggleCoffee();
});

// --- Start ---
initCDP();
</script>
</body>
</html>
