<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mittagsmenü</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #e0e0e0;
    min-height: 100vh;
    padding: 40px 60px;
  }

  h1 {
    font-size: 3em;
    color: #fff;
    margin-bottom: 8px;
    font-weight: 300;
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 1.3em;
    color: #888;
    margin-bottom: 40px;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 24px;
  }

  .category {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 24px;
    border-left: 4px solid #6c63ff;
  }
  .category:nth-child(2) { border-left-color: #00c853; }
  .category:nth-child(3) { border-left-color: #ff9800; }
  .category:nth-child(4) { border-left-color: #e94560; }
  .category:nth-child(5) { border-left-color: #00bcd4; }
  .category:nth-child(6) { border-left-color: #ffea00; }

  .category-name {
    font-size: 1.1em;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    font-weight: 600;
  }

  .product {
    margin-bottom: 16px;
  }
  .product:last-child { margin-bottom: 0; }

  .product-name {
    font-size: 1.4em;
    color: #fff;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .product-desc {
    font-size: 1em;
    color: #aaa;
    line-height: 1.4;
  }
  .product-price {
    font-size: 1em;
    margin-top: 4px;
    font-weight: 600;
  }
  .price-int { color: #4caf50; }
  .price-sep { color: #555; }
  .price-ext { color: #ff9800; }
  .product-origin {
    font-size: 0.85em;
    color: #666;
    margin-top: 2px;
  }

  #loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60vh;
    font-size: 1.5em;
    color: #888;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #333; border-top-color: #6c63ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #error { color: #f44336; font-size: 1.2em; text-align: center; margin-top: 40px; }
</style>
</head>
<body>

<h1>Mittagsmenü Nord</h1>
<div class="subtitle" id="dateDisplay">Baloise, Basel</div>
<div id="loading"><div class="spinner"></div> Menü wird geladen...</div>
<div class="menu-grid" id="menuGrid"></div>
<div id="error"></div>

<script>
// Qnips / SV-Gastronomie API config
const QNIPS_API = "https://apps-live-eu.qnips.com/cons/api";
const QNIPS_AUTH = "000981c0f9391630f993c9c2ecdb8b46f67";
const FIREBASE_KEY = "AIzaSyDR_h6fX9hBl2I7oy7xjzmYgDxJY2igdls";
const FIRESTORE_PROJECT = "qnips-sv-group-ch";
const MENU_ID = "18231"; // Mittagsmenü Nord, Baloise Basel
const LANG = "de-CH";

async function getFirebaseToken() {
  // Step 1: Get anonymous identity from Qnips (GET request, not POST)
  var resp = await fetch(QNIPS_API + "/NewIdentity", {
    method: "GET",
    headers: {
      "App-Brand": "svgroupch",
      "Response-Version": "v3",
      "Authorization": QNIPS_AUTH
    }
  });
  if (!resp.ok) throw new Error("Qnips auth failed: " + resp.status);
  var data = await resp.json();
  var content = data.Content || data;

  if (!content.FirebaseCustomToken) {
    throw new Error("No FirebaseCustomToken in response. Keys: " + Object.keys(content).join(", "));
  }

  // Step 2: Exchange custom token for Firebase ID token
  var tokenResp = await fetch(
    "https://identitytoolkit.googleapis.com/v1/accounts:signInWithCustomToken?key=" + FIREBASE_KEY,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: content.FirebaseCustomToken, returnSecureToken: true })
    }
  );
  if (!tokenResp.ok) throw new Error("Firebase auth failed: " + tokenResp.status);
  var tokenData = await tokenResp.json();
  return tokenData.idToken;
}

function getISOWeekNumber(date) {
  var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

async function fetchMenu() {
  try {
    var token = await getFirebaseToken();
    var now = new Date();
    var year = now.getFullYear();
    var week = getISOWeekNumber(now);
    var weekDay = (now.getDay() + 6) % 7; // 0=Monday

    var url = "https://firestore.googleapis.com/v1/projects/" + FIRESTORE_PROJECT +
      "/databases/(default)/documents/Release/" + LANG + "/Menus/" + MENU_ID +
      "/Years/" + year + "/Weeks/" + week;

    var resp = await fetch(url, {
      headers: { "Authorization": "Bearer " + token }
    });
    if (!resp.ok) throw new Error("Firestore fetch failed: " + resp.status);
    var doc = await resp.json();

    // Parse Firestore document
    var fields = doc.fields;
    if (!fields || !fields.Days) throw new Error("No menu data found");

    var days = fields.Days.arrayValue.values;
    var today = days[weekDay];
    if (!today) throw new Error("No menu for today");

    var dayFields = today.mapValue.fields;
    var categories = dayFields.Categories.arrayValue.values;

    // Update date display
    var dayNames = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];
    document.getElementById("dateDisplay").textContent =
      "Baloise, Basel — " + dayNames[weekDay] + ", " +
      now.toLocaleDateString("de-CH", { day: "numeric", month: "long", year: "numeric" });

    renderMenu(categories);
  } catch (e) {
    console.error(e);
    document.getElementById("error").textContent = "Fehler: " + e.message;
  }
  document.getElementById("loading").style.display = "none";
}

function getFieldValue(field) {
  if (!field) return "";
  if (field.stringValue !== undefined) return field.stringValue;
  if (field.integerValue !== undefined) return field.integerValue;
  if (field.doubleValue !== undefined) return field.doubleValue;
  return "";
}

function renderMenu(categories) {
  var grid = document.getElementById("menuGrid");
  grid.innerHTML = "";

  for (var i = 0; i < categories.length; i++) {
    var cat = categories[i].mapValue.fields;
    var catName = getFieldValue(cat.Name);
    var products = cat.Products ? cat.Products.arrayValue.values : [];

    if (!products || products.length === 0) continue;

    var div = document.createElement("div");
    div.className = "category";

    var html = '<div class="category-name">' + escapeHtml(catName) + '</div>';

    for (var j = 0; j < products.length; j++) {
      var prod = products[j].mapValue.fields;
      var name = getFieldValue(prod.Name);
      var teaser = getFieldValue(prod.Teaser);
      var desc = getFieldValue(prod.Description);

      // Get prices (INT = internal, EXT = external)
      var intPrice = "", extPrice = "";
      if (prod.Prices && prod.Prices.arrayValue && prod.Prices.arrayValue.values) {
        var prices = prod.Prices.arrayValue.values;
        for (var k = 0; k < prices.length; k++) {
          var p = prices[k].mapValue.fields;
          var tag = getFieldValue(p.Tag) || getFieldValue(p.Label);
          var amount = getFieldValue(p.Price) || 0;
          if (amount > 0) {
            var formatted = "CHF " + parseFloat(amount).toFixed(2);
            if (tag === "INT") intPrice = formatted;
            if (tag === "EXT") extPrice = formatted;
          }
        }
      }

      html += '<div class="product">';
      html += '<div class="product-name">' + escapeHtml(name) + '</div>';
      if (teaser) html += '<div class="product-desc">' + escapeHtml(teaser) + '</div>';
      if (intPrice || extPrice) {
        html += '<div class="product-price">';
        if (intPrice) html += '<span class="price-int">Intern: ' + intPrice + '</span>';
        if (intPrice && extPrice) html += '<span class="price-sep"> | </span>';
        if (extPrice) html += '<span class="price-ext">Extern: ' + extPrice + '</span>';
        html += '</div>';
      }
      if (desc) html += '<div class="product-origin">' + escapeHtml(desc) + '</div>';
      html += '</div>';
    }

    div.innerHTML = html;
    grid.appendChild(div);
  }
}

function escapeHtml(str) {
  var div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

fetchMenu();
</script>
</body>
</html>
